# ── DataSource H2 em memória ──────────────────────────────────
spring.datasource.url=jdbc:h2:mem:bipdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Necessário para o Hibernate reconhecer entidades do ejb-module
spring.jpa.properties.hibernate.globally_quoted_identifiers=false

# Log de transações
logging.level.org.springframework.transaction=DEBUG
logging.level.org.hibernate.engine.transaction.internal.TransactionImpl=DEBUG
logging.file.name=logs/app.log

# ── SQL de inicialização ──────────────────────────────────────
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:seed.sql

# ── H2 Console (desenvolvimento) ─────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Servidor ──────────────────────────────────────────────────
server.port=8080

# ── Swagger / OpenAPI ───────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
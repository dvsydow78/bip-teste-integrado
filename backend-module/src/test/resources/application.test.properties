# ── PROFILE: TEST ─────────────────────────────────────────────
# NO TESTS: Hibernate cria tabelas automaticamente, sem schema.sql
# spring.jpa.hibernate.ddl-auto=create-drop

# ── SQL de inicialização (DESABILITAR para tests) ──────────────
# spring.sql.init.mode=never

# ── DataSource H2 com banco fresh ──────────────────────────────
# spring.datasource.url=jdbc:h2:mem:bipdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ───────────────────────────────────────────
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.globally_quoted_identifiers=false

# ── H2 Console ─────────────────────────────────────────────────
spring.h2.console.enabled=false

# ── Logging ────────────────────────────────────────────────────
logging.level.org.springframework.test.context=WARN
logging.level.org.springframework.transaction=WARN

spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=never
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
# spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect